[project]
name = "lab-04-rag"
version = "0.1.0"
description = ""
authors = [
    {name = "carrinodue",email = "francesco.carrino@hes-so.ch"}
]
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
    "langchain (>=0.3.19,<0.4.0)",
    "langchain-community (>=0.3.18,<0.4.0)",
    "faiss-cpu (>=1.10.0,<2.0.0)",
    "pymupdf (>=1.25.3,<2.0.0)",
    "pypdf (>=5.3.0,<6.0.0)",
    "sentence-transformers (>=3.4.1,<4.0.0)",
    "rich (>=13.9.4,<14.0.0)",
    "wget (>=3.2,<4.0)",
    "python-dotenv (>=1.0.1,<2.0.0)",
    "cryptography (>=44.0.1,<45.0.0)",
    "ollama (>=0.4.7,<0.5.0)",
    "ipykernel (>=6.29.5,<7.0.0)",
    "langchain-huggingface (>=0.1.2,<0.2.0)",
    "langchain-unstructured (>=0.1.6,<0.2.0)",
    "unstructured (>=0.16.23,<0.17.0)",
    "torch (==2.6.0+cu118)",
    "torchvision (==0.21.0+cu118)",
    "torchaudio (==2.6.0+cu118)",
    "langchain-ollama (>=0.2.3,<0.3.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
package-mode = false

[[tool.poetry.source]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu118"
priority = "explicit"


[tool.poetry.dependencies]
torch = {source = "pytorch"}
torchvision = {source = "pytorch"}
torchaudio = {source = "pytorch"}
